name: Build & Release Honoka Bridge

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    name: Build Cross-Platform Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd honoka-bridge
          npm install

      - name: Build binaries
        run: |
          cd honoka-bridge
          mkdir -p bin
          npm run build:all

      - name: Upload artifacts (on push to main)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: honoka-bridge-binaries
          path: honoka-bridge/bin/*

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            honoka-bridge/bin/honoka-bridge.exe
            honoka-bridge/bin/honoka-bridge-macos
            honoka-bridge/bin/honoka-bridge-linux
          body_path: honoka-lite/CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
