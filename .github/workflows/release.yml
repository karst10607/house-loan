name: Build & Release Honoka Bridge

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    name: Build Cross-Platform Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd honoka-lite/honoka-bridge
          npm install

      - name: Build binaries
        run: |
          cd honoka-lite/honoka-bridge
          mkdir -p bin
          npm run build:all

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp honoka-lite/honoka-bridge/bin/honoka-bridge.exe release-assets/
          cp honoka-lite/honoka-bridge/bin/honoka-bridge-macos release-assets/
          cp honoka-lite/honoka-bridge/bin/honoka-bridge-linux release-assets/
          # Also include the extension folder for manual installation
          cp -r honoka-lite/chrome-extension release-assets/
          cd release-assets
          zip -r honoka-lite-win64.zip honoka-bridge.exe chrome-extension
          zip -r honoka-lite-macos.zip honoka-bridge-macos chrome-extension
          zip -r honoka-lite-linux.zip honoka-bridge-linux chrome-extension

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/honoka-lite-win64.zip
            release-assets/honoka-lite-macos.zip
            release-assets/honoka-lite-linux.zip
          body_path: honoka-lite/CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
