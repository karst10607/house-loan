name: Build & Release Honoka Bridge

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Cross-Platform Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd honoka-lite/honoka-bridge && npm install
          cd ../chrome-extension && npm install

      - name: Build binaries
        continue-on-error: true
        run: |
          cd honoka-lite/honoka-bridge
          mkdir -p bin
          npm run build:all

      - name: Build extension dist
        run: |
          cd honoka-lite/chrome-extension
          npm run build

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Copy bridge binaries (if built — may fail with pkg, that's OK)
          cp honoka-lite/honoka-bridge/bin/honoka-bridge.exe release-assets/ 2>/dev/null || true
          cp honoka-lite/honoka-bridge/bin/honoka-bridge-macos release-assets/ 2>/dev/null || true
          cp honoka-lite/honoka-bridge/bin/honoka-bridge-linux release-assets/ 2>/dev/null || true

          # Build clean extension distro (only what end-users need)
          mkdir -p release-assets/chrome-extension/dist
          cp honoka-lite/chrome-extension/manifest.json release-assets/chrome-extension/
          cp honoka-lite/chrome-extension/dist/content.js release-assets/chrome-extension/dist/
          cp -r honoka-lite/chrome-extension/src release-assets/chrome-extension/
          cp -r honoka-lite/chrome-extension/popup release-assets/chrome-extension/
          cp -r honoka-lite/chrome-extension/options release-assets/chrome-extension/
          cp -r honoka-lite/chrome-extension/icons release-assets/chrome-extension/
          [ -d honoka-lite/chrome-extension/viewer ] && cp -r honoka-lite/chrome-extension/viewer release-assets/chrome-extension/ || true

          cd release-assets
          # Only zip what exists
          zip -r honoka-lite-win64.zip honoka-bridge.exe chrome-extension 2>/dev/null || zip -r honoka-lite-win64.zip chrome-extension
          zip -r honoka-lite-macos.zip honoka-bridge-macos chrome-extension 2>/dev/null || true
          zip -r honoka-lite-linux.zip honoka-bridge-linux chrome-extension 2>/dev/null || true

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
          body_path: honoka-lite/CHANGELOG.md
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
