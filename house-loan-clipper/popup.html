<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #0f3460;
      --highlight: #e94560;
      --teal: #2dd4bf;
      --text: #e8e8f0;
      --dim: #888;
    }
    * { box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .header-icon { font-size: 20px; }
    .header h3 { 
      font-size: 13px; margin: 0; color: var(--teal); 
      letter-spacing: 0.05em; text-transform: uppercase; font-weight: 700;
    }

    #preview-container {
      background: var(--card);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .preview-header { 
      font-weight: 600; font-size: 13px; margin-bottom: 6px; 
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      line-height: 1.4;
    }
    .preview-meta { font-size: 11px; color: var(--dim); display: flex; gap: 10px; }

    .mode-indicator {
      font-size: 11px;
      text-align: center;
      padding: 6px 10px;
      background: rgba(45, 212, 191, 0.08);
      border: 1px dashed rgba(45, 212, 191, 0.3);
      border-radius: 6px;
      color: var(--teal);
      margin-bottom: 10px;
      display: none;
    }
    .mode-indicator.visible { display: block; }

    .selection-count {
      font-size: 11px;
      text-align: center;
      color: var(--highlight);
      margin-bottom: 8px;
      display: none;
    }
    .selection-count.visible { display: block; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }

    button {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      transition: all 0.15s ease;
    }
    #select-btn {
      background: rgba(233, 69, 96, 0.15);
      color: var(--highlight);
      border: 1px solid rgba(233, 69, 96, 0.3);
    }
    #select-btn:hover { background: rgba(233, 69, 96, 0.25); }
    #select-btn.active {
      background: var(--highlight);
      color: white;
      border-color: var(--highlight);
    }

    #clip-btn {
      background: var(--teal);
      color: #000;
    }
    #clip-btn:hover { background: #24b09e; }
    #clip-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

    #fullpage-btn {
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--dim);
      font-size: 11px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }
    #fullpage-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .status { font-size: 11px; color: var(--dim); text-align: center; min-height: 16px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🧠</span>
    <h3>Knowledge Hub Clipper</h3>
  </div>

  <div id="preview-container">
    <div id="preview-title" class="preview-header">Analyzing page...</div>
    <div class="preview-meta">
      <span id="img-count">📸 --</span>
      <span id="char-count">📄 --</span>
    </div>
  </div>

  <div id="mode-indicator" class="mode-indicator">
    ✋ 選取模式啟動中 — 點擊頁面上的區塊來選取內容
  </div>
  <div id="selection-count" class="selection-count"></div>

  <div class="btn-row">
    <button id="select-btn">🎯 選取區塊</button>
    <button id="clip-btn" disabled>💾 儲存</button>
  </div>
  <button id="fullpage-btn">📄 儲存整頁（自動提取主文）</button>
  <div id="status" class="status">初始化中...</div>

  <script src="popup.js"></script>
</body>
</html>
