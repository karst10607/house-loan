<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>房貸計算器 | House Loan Calculator</title>
  <meta name="description" content="免費的房貸計算器，輸入貸款金額、年利率和年限，計算每月應繳金額及完整攤還表。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 14L16 4L28 14V28H20V20H12V28H4V14Z" fill="url(#logoGrad)" />
          <defs>
            <linearGradient id="logoGrad" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#818cf8"/>
              <stop offset="1" stop-color="#c084fc"/>
            </linearGradient>
          </defs>
        </svg>
        <span>房貸計算器</span>
      </div>
      <p class="header-sub">House Loan Calculator</p>
    </div>
  </header>

  <main class="main-container">
    <!-- Input Card -->
    <section class="card input-card" aria-label="貸款資訊輸入">
      <h2 class="card-title">貸款資訊</h2>

      <div class="form-grid">
        <div class="form-group">
          <label for="loanAmount">貸款金額</label>
          <div class="input-wrapper">
            <span class="input-prefix">NT$</span>
            <input
              type="number"
              id="loanAmount"
              placeholder="5,000,000"
              min="0"
              step="100000"
              value="5000000"
              aria-label="貸款金額（新台幣）"
            />
          </div>
          <span class="input-hint" id="amountHint"></span>
        </div>

        <div class="form-group">
          <label for="annualRate">年利率</label>
          <div class="input-wrapper">
            <input
              type="number"
              id="annualRate"
              placeholder="2.5"
              min="0"
              max="30"
              step="0.01"
              value="2.5"
              aria-label="年利率（百分比）"
            />
            <span class="input-suffix">%</span>
          </div>
        </div>

        <div class="form-group">
          <label for="loanYears">貸款年限</label>
          <div class="input-wrapper">
            <input
              type="number"
              id="loanYears"
              placeholder="20"
              min="1"
              max="40"
              step="1"
              value="20"
              aria-label="貸款年限（年）"
            />
            <span class="input-suffix">年</span>
          </div>
        </div>

        <div class="form-group full-width">
          <label>還款方式</label>
          <div class="radio-group" role="radiogroup" aria-label="還款方式">
            <label class="radio-option">
              <input type="radio" name="repayType" value="equal-payment" id="equalPayment" checked />
              <span class="radio-label">
                <strong>本息均攤</strong>
                <small>每月還款金額固定</small>
              </span>
            </label>
            <label class="radio-option">
              <input type="radio" name="repayType" value="equal-principal" id="equalPrincipal" />
              <span class="radio-label">
                <strong>本金均攤</strong>
                <small>每月還款本金固定，利息遞減</small>
              </span>
            </label>
          </div>
        </div>
      </div>

      <button id="calcBtn" class="calc-btn" aria-label="開始計算">
        <span class="btn-text">計算</span>
        <svg class="btn-icon" viewBox="0 0 20 20" fill="none"><path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </section>

    <!-- Result Section -->
    <section class="results-section" id="resultsSection" aria-live="polite" hidden>
      <!-- Summary Cards -->
      <div class="summary-grid">
        <div class="summary-card" id="cardMonthly">
          <div class="summary-label">首月月付金額</div>
          <div class="summary-value" id="monthlyPayment">—</div>
          <div class="summary-sub" id="monthlyPaymentSub"></div>
        </div>
        <div class="summary-card accent">
          <div class="summary-label">總利息支出</div>
          <div class="summary-value" id="totalInterest">—</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">總還款金額</div>
          <div class="summary-value" id="totalPayment">—</div>
        </div>
      </div>

      <!-- Breakdown Bar -->
      <div class="breakdown-bar-container card" id="breakdownBarCard">
        <div class="breakdown-bar-label">
          <span>本金 <strong id="principalPct"></strong></span>
          <span>利息 <strong id="interestPct"></strong></span>
        </div>
        <div class="breakdown-bar" id="breakdownBar" role="img" aria-label="本金與利息比例">
          <div class="bar-principal" id="barPrincipal"></div>
          <div class="bar-interest" id="barInterest"></div>
        </div>
      </div>

      <!-- Amortization Toggle -->
      <div class="amort-header">
        <h3>攤還明細表</h3>
        <button id="toggleAmort" class="toggle-btn" aria-expanded="false" aria-controls="amortTable">
          展開明細
        </button>
      </div>

      <div id="amortWrapper" class="amort-wrapper" hidden>
        <div class="table-scroll">
          <table id="amortTable" class="amort-table">
            <thead>
              <tr>
                <th scope="col">期數</th>
                <th scope="col">月付金額</th>
                <th scope="col">還款本金</th>
                <th scope="col">利息</th>
                <th scope="col">剩餘本金</th>
              </tr>
            </thead>
            <tbody id="amortBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>本計算器結果僅供參考，實際貸款條件請以銀行為準。</p>
    <p class="footer-copy">© 2026 房貸計算器 · <a href="https://github.com" target="_blank" rel="noopener">GitHub</a></p>
  </footer>

  <script type="module" src="app.js"></script>
  <script src="calculator.js"></script>
  <script>
    /* Pear Runtime detection — only runs inside Pear, ignored in browsers */
    if (typeof Pear !== 'undefined') {
      document.querySelector('.footer-copy').innerHTML +=
        ' · <span style="color:#34d399">🍐 Pear P2P</span>';
    }
  </script>
</body>
</html>
